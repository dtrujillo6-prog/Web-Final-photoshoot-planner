<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <!-- Using lucide icons via unpkg -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <h1>Dashboard</h1>
                <div class="header-actions">
                    <button id="btn-theme-toggle" class="btn-icon" title="Toggle Theme">
                        <i data-lucide="sun"></i>
                    </button>
                    <button id="btn-add-category" class="btn btn-secondary">
                        <i data-lucide="folder-plus"></i> New Category
                    </button>
                    <button id="btn-add-link" class="btn btn-primary">
                        <i data-lucide="plus"></i> Add Link
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Categories will be injected here -->
            <div id="categories-container" class="categories-grid">
                <!-- Example Skeleton structure (will be cleared by JS) -->
                <div class="empty-state" id="empty-state" style="display: none;">
                    <i data-lucide="layout-grid"></i>
                    <h2>No categories yet</h2>
                    <p>Create a category to start adding links.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay"></div>

    <!-- Add/Edit Link Modal -->
    <div id="link-modal" class="modal">
        <div class="modal-header">
            <h2 id="link-modal-title">Add Link</h2>
            <button class="btn-icon btn-close-modal"><i data-lucide="x"></i></button>
        </div>
        <form id="link-form" class="modal-form">
            <input type="hidden" id="link-id">
            <div class="form-group">
                <label for="link-url">URL</label>
                <input type="url" id="link-url" placeholder="https://example.com" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="link-name">Name</label>
                <input type="text" id="link-name" placeholder="Website Name" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="link-category">Category</label>
                <select id="link-category" required>
                    <!-- Options injected by JS -->
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-close-modal">Cancel</button>
                <button type="submit" class="btn btn-primary" id="btn-save-link">Save Link</button>
            </div>
        </form>
    </div>

    <!-- Add Category Modal -->
    <div id="category-modal" class="modal">
        <div class="modal-header">
            <h2>New Category</h2>
            <button class="btn-icon btn-close-modal"><i data-lucide="x"></i></button>
        </div>
        <form id="category-form" class="modal-form">
            <div class="form-group">
                <label for="category-name">Category Name</label>
                <input type="text" id="category-name" placeholder="e.g., Work, Social, Learning" required
                    autocomplete="off">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-close-modal">Cancel</button>
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        // Init Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
